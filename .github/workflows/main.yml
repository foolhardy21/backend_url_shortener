name: Deploy application
on:
  push:
    branches: 
      - main

jobs:
  run_build_job:
    name: Deploy application Job
    runs-on: ubuntu-latest
    
    services:
      redis:
        image: redis
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    env:
      TEST_API_KEY: ${{ secrets.TEST_API_KEY }}
      BLACKLIST_TEST_API_KEY: ${{ secrets.BLACKLIST_TEST_API_KEY }}
    
    steps:
      - name: Checkout to project
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
        
      - name: Installing dependencies
        run: npm ci

      - name: Linting
        run: npm run lint

      - name: Testing
        run: npm run test -- --coverage

      - name: Building
        run: npm run build
